name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Convex and Cloudflare
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.4.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Verify
        run: pnpm run verify

      - name: Check required deployment secrets
        run: |
          missing=0
          for name in CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN CONVEX_DEPLOY_KEY; do
            value=$(printenv "$name" || true)
            if [ -z "$value" ]; then
              echo "::error::$name is not set in GitHub Actions secrets"
              missing=1
            fi
          done
          exit "$missing"

      - name: Deploy Convex
        run: pnpm exec convex deploy

      - name: Check Docker
        run: docker version

      - name: Deploy Cloudflare
        run: pnpm exec wrangler deploy
